<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#16234b">
    <meta name="description" content="Casa Calda — ახალი ვებსაიტი მალე იხსნება">
    <meta property="og:title" content="Casa Calda — მალე ვიხილავთ">
    <meta property="og:description" content="ჩვენი ახალი ვებსაიტი მზადდება">
    <meta property="og:type" content="website">
    <title>Casa Calda — მალე</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #ef6825;
            --orange-bright: #ff884d;
            --navy: #16234b;
            --navy-deep: #0a1430;
            --white: #ffffff;
            --gray: rgba(255,255,255,0.65);
            --ease: cubic-bezier(.25, 1, .5, 1);
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        body {
            font-family: 'Noto Sans Georgian', system-ui, -apple-system, sans-serif;
            color: var(--white);
            background: var(--navy-deep);
            min-height: 100svh;
            min-height: 100vh;
            overflow-x: hidden;
            display: grid;
            place-items: center;
            position: relative;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* Background — deep navy with subtle blueprint grid overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(239,104,37,0.18) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(42,92,164,0.25) 0%, transparent 55%),
                linear-gradient(180deg, var(--navy-deep) 0%, var(--navy) 100%);
            z-index: -2;
        }
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 56px 56px;
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
            z-index: -1;
            opacity: 0.7;
        }

        .stage {
            width: 100%;
            max-width: 880px;
            padding: 48px 32px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            animation: rise .9s var(--ease) both;
        }

        .tagline {
            font-size: clamp(11px, 1.6vw, 14px);
            font-weight: 600;
            color: rgba(255,255,255,0.7);
            text-transform: uppercase;
            letter-spacing: clamp(2px, 0.6vw, 4.5px);
            text-align: center;
            position: relative;
            padding: 0 32px;
        }
        .tagline strong {
            color: var(--orange-bright);
            font-weight: 700;
        }
        .tagline::before, .tagline::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 20px;
            height: 1px;
            background: rgba(255,255,255,0.25);
        }
        .tagline::before { left: 0; }
        .tagline::after { right: 0; }

        .logo-wrap {
            position: relative;
            width: min(560px, 82vw);
            filter: drop-shadow(0 12px 40px rgba(0,0,0,0.4));
        }
        .logo-wrap img {
            width: 100%;
            height: auto;
            display: block;
        }
        .logo-wrap::after {
            content: '';
            position: absolute;
            inset: -40px;
            background: radial-gradient(ellipse at center, rgba(239,104,37,0.18) 0%, transparent 60%);
            z-index: -1;
            animation: glow 4s ease-in-out infinite;
        }

        .eyebrow {
            font-size: 13px;
            font-weight: 600;
            color: var(--orange-bright);
            text-transform: uppercase;
            letter-spacing: 2.5px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }
        .eyebrow::before, .eyebrow::after {
            content: '';
            width: 32px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--orange));
        }
        .eyebrow::after { background: linear-gradient(-90deg, transparent, var(--orange)); }

        h1 {
            font-size: clamp(36px, 7vw, 72px);
            font-weight: 800;
            line-height: 1.05;
            letter-spacing: -1.5px;
            color: var(--white);
            max-width: 720px;
        }
        h1 em {
            font-style: normal;
            color: var(--orange);
            position: relative;
            display: inline-block;
        }
        h1 em::after {
            content: '';
            position: absolute;
            left: 0; right: 0; bottom: -6px;
            height: 3px;
            background: var(--orange);
            border-radius: 3px;
            transform: scaleX(0);
            transform-origin: left;
            animation: underline 1s var(--ease) .7s forwards;
        }

        .sub {
            font-size: clamp(15px, 2.2vw, 18px);
            font-weight: 400;
            color: var(--gray);
            max-width: 540px;
            line-height: 1.6;
        }

        .progress {
            width: 100%;
            max-width: 460px;
            margin: 8px 0;
        }
        .progress__track {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress__fill {
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, var(--orange), var(--orange-bright));
            border-radius: 4px;
            animation: fill 2.5s var(--ease) .4s forwards;
            box-shadow: 0 0 16px rgba(239,104,37,0.5);
        }
        .progress__label {
            margin-top: 12px;
            font-size: 12px;
            color: var(--gray);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .contact {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 16px;
        }
        .contact a {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 24px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 100px;
            color: var(--white);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all .3s var(--ease);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .contact a:hover, .contact a:focus-visible {
            background: var(--orange);
            border-color: var(--orange);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(239,104,37,0.35);
        }
        .contact a:focus-visible { outline: 2px solid var(--white); outline-offset: 3px; }
        .contact svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        footer {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            text-align: center;
            padding: 20px 24px calc(20px + env(safe-area-inset-bottom));
            font-size: 12px;
            color: rgba(255,255,255,0.45);
            letter-spacing: 0.5px;
        }
        footer span { color: var(--orange-bright); }

        @keyframes rise {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes glow {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50%      { opacity: 1;   transform: scale(1.08); }
        }
        @keyframes underline {
            to { transform: scaleX(1); }
        }
        @keyframes fill {
            to { width: 72%; }
        }

        /* Mobile */
        @media (max-width: 600px) {
            .stage {
                padding: 32px 20px;
                gap: 28px;
            }
            .logo-wrap { width: min(380px, 78vw); }
            .eyebrow { font-size: 11px; letter-spacing: 2px; }
            .eyebrow::before, .eyebrow::after { width: 20px; }
            .contact { flex-direction: column; width: 100%; max-width: 320px; }
            .contact a { justify-content: center; width: 100%; }
        }
        @media (max-width: 400px) {
            h1 { letter-spacing: -1px; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
            .progress__fill { width: 72%; }
            h1 em::after { transform: scaleX(1); }
        }
    </style>
</head>
<body>

    <main class="stage">
        <div class="logo-wrap">
            <img src="assets/logo-main-white.svg" alt="Casa Calda" width="560" height="270">
        </div>

        <p class="tagline"><strong>25 Years</strong> of Engineering Excellence</p>

        <p class="eyebrow">მზადდება</p>

        <h1>ჩვენი ახალი ვებსაიტი <em>მალე</em> იხსნება</h1>

        <p class="sub">ვაუმჯობესებთ Casa Calda-ს ციფრულ გამოცდილებას. დაგვიკავშირდით პროექტებთან დაკავშირებით ნებისმიერ დროს.</p>

        <div class="progress" aria-hidden="true">
            <div class="progress__track">
                <div class="progress__fill"></div>
            </div>
            <div class="progress__label">In progress</div>
        </div>

        <div class="contact">
            <a href="mailto:info@casacalda.ge">
                <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                info@casacalda.ge
            </a>
            <a href="tel:+995322311325">
                <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                +995 32 2 311 325
            </a>
        </div>
    </main>

    <footer>
        © <span>Casa Calda</span> · 25 წელი საინჟინრო ექსპერტიზა
    </footer>

</body>
</html>
